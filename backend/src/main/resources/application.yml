server:
  port: 8083
  address: 0.0.0.0  # Listen on all network interfaces (allows Android emulator access)
  servlet:
    context-path: /api

spring:
  application:
    name: sankalai-backend

  # Active profile: 'dev' by default (H2, no env required). Set SPRING_PROFILES_ACTIVE=prod
  # in production to load application-prod.yml (PostgreSQL + hardened settings).
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:h2:file:./data/sankalaai_db;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  jackson:
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false

# JWT Configuration
# In production, ALWAYS set JWT_SECRET (>= 256-bit / 32+ chars). The fallback below is a
# dev-only key so local development runs without extra setup — do not use it in production.
jwt:
  secret: ${JWT_SECRET:dev-only-insecure-secret-change-me-min-256-bits-0123456789}
  expiration: 86400000 # 24 hours in milliseconds
  refresh-expiration: 604800000 # 7 days

# Google Sign-In
# Set GOOGLE_CLIENT_IDS to a comma-separated list of allowed Google OAuth client IDs.
# For React Native Google Sign-In, include the same Web OAuth client ID used by
# EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID so the backend accepts the ID token audience.
google:
  client-ids: ${GOOGLE_CLIENT_IDS:${EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID:326444710252-9704h8r9lcoj5m3bfneblv59l2mnnuo1.apps.googleusercontent.com}}

# CORS
# Comma-separated list of allowed origins. '*' (dev default) allows any origin; in
# production set CORS_ALLOWED_ORIGINS to your app/web origins explicitly.
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}

# Logging
logging:
  level:
    com.sankalai: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
