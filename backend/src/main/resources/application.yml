server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: sankalai-backend
  
  datasource:
    url: jdbc:postgresql://localhost:5432/sankalaai_db
    username: sankalai_user
    password: Sankalai@123
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jackson:
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false

# JWT Configuration
jwt:
  secret: YOUR_SECRET_KEY_CHANGE_THIS_IN_PRODUCTION_MIN_256_BITS
  expiration: 86400000 # 24 hours in milliseconds
  refresh-expiration: 604800000 # 7 days

# Logging
logging:
  level:
    com.sankalai: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
