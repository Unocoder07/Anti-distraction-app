server:
  port: 8083
  address: 0.0.0.0  # Listen on all network interfaces (allows Android emulator access)
  servlet:
    context-path: /api

spring:
  application:
    name: sankalai-backend

  datasource:
    url: jdbc:h2:file:./data/sankalaai_db;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  jackson:
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false

# JWT Configuration
jwt:
  secret: YOUR_SECRET_KEY_CHANGE_THIS_IN_PRODUCTION_MIN_256_BITS
  expiration: 86400000 # 24 hours in milliseconds
  refresh-expiration: 604800000 # 7 days

# Logging
logging:
  level:
    com.sankalai: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
