version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: sankalai-postgres
    environment:
      POSTGRES_DB: sankalaai_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sankalai-network

  backend:
    build: .
    container_name: sankalai-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sankalaai_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      - postgres
    networks:
      - sankalai-network

volumes:
  postgres_data:

networks:
  sankalai-network:
    driver: bridge
